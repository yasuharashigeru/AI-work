<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラーパレット</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 32px; }
  h1 { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.1em; color: #aaa; margin-bottom: 28px; }

  .layout { display: grid; grid-template-columns: 1fr; gap: 32px; max-width: 480px; }

  /* ピッカー */
  .picker-section { display: flex; flex-direction: column; gap: 16px; }
  input[type="color"] {
    width: 100%; height: 220px; border: none; border-radius: 12px;
    cursor: pointer; background: none; padding: 0;
  }
  .values { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .val-box {
    background: #16213e; border-radius: 8px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .val-label { font-size: 0.65rem; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
  .val-text { font-size: 1rem; font-weight: 600; color: #eee; cursor: pointer; }
  .val-text:hover { color: #7eb8f7; }
  .copy-hint { font-size: 0.65rem; color: #444; margin-top: 2px; }

  /* 履歴 */
  .history-section { grid-column: 1 / -1; }
  .history-section h2 { font-size: 0.75rem; color: #555; letter-spacing: 0.1em; margin-bottom: 12px; }
  .history { display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch {
    width: 48px; height: 48px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .swatch:hover { transform: scale(1.15); border-color: #fff4; }
  .swatch .swatch-tip {
    display: none; position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    background: #0f0f1a; color: #eee; font-size: 0.7rem; padding: 4px 8px;
    border-radius: 4px; white-space: nowrap; pointer-events: none;
  }
  .swatch:hover .swatch-tip { display: block; }

  /* トースト */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #7eb8f7; color: #0f0f1a; font-size: 0.85rem; font-weight: 600;
    padding: 10px 18px; border-radius: 8px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<h1>COLOR PALETTE</h1>
<div class="layout">
  <div class="picker-section">
    <input type="color" id="picker" value="#7eb8f7">
    <div class="values">
      <div class="val-box">
        <span class="val-label">HEX</span>
        <span class="val-text" id="hex" onclick="copy('hex')">#7eb8f7</span>
        <span class="copy-hint">クリックでコピー</span>
      </div>
      <div class="val-box">
        <span class="val-label">RGB</span>
        <span class="val-text" id="rgb" onclick="copy('rgb')">126, 184, 247</span>
        <span class="copy-hint">クリックでコピー</span>
      </div>
      <div class="val-box">
        <span class="val-label">HSL</span>
        <span class="val-text" id="hsl" onclick="copy('hsl')">210°, 88%, 73%</span>
        <span class="copy-hint">クリックでコピー</span>
      </div>
      <div class="val-box">
        <span class="val-label">CSS</span>
        <span class="val-text" id="css" onclick="copy('css')">rgb(126,184,247)</span>
        <span class="copy-hint">クリックでコピー</span>
      </div>
    </div>
  </div>

  <div class="history-section">
    <h2>履歴（クリックで再選択）</h2>
    <div class="history" id="history"></div>
  </div>
</div>
<div id="toast">コピーしました</div>

<script>
const picker = document.getElementById('picker');
const history = [];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}
    h/=6;
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function update(hex) {
  const {r,g,b} = hexToRgb(hex);
  const {h,s,l} = rgbToHsl(r,g,b);
  document.getElementById('hex').textContent = hex.toUpperCase();
  document.getElementById('rgb').textContent = `${r}, ${g}, ${b}`;
  document.getElementById('hsl').textContent = `${h}°, ${s}%, ${l}%`;
  document.getElementById('css').textContent = `rgb(${r},${g},${b})`;
}

function addHistory(hex) {
  if(history.includes(hex)) return;
  history.unshift(hex);
  if(history.length > 20) history.pop();
  const div = document.getElementById('history');
  div.innerHTML = history.map(c=>`
    <div class="swatch" style="background:${c}" onclick="setColor('${c}')">
      <span class="swatch-tip">${c.toUpperCase()}</span>
    </div>`).join('');
}

function setColor(hex) {
  picker.value = hex;
  update(hex);
}

async function copy(id) {
  const text = document.getElementById(id).textContent;
  const t = document.getElementById('toast');
  try {
    await navigator.clipboard.writeText(text);
    t.textContent = `「${text}」をコピーしました`;
  } catch {
    t.textContent = 'コピーに失敗しました';
  }
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

picker.addEventListener('input', e => update(e.target.value));
picker.addEventListener('change', e => addHistory(e.target.value));

update(picker.value);
addHistory(picker.value);
</script>
</body>
</html>
