<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<title>カラーパレット</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #222; min-height: 100vh; padding: 24px 20px; }
  h1 { font-size: 1.1rem; font-weight: 400; letter-spacing: 0.1em; color: #999; margin-bottom: 24px; }

  .layout { display: flex; flex-direction: column; gap: 16px; max-width: 480px; }

  /* SV square */
  .sv-wrap { position: relative; border-radius: 10px; overflow: hidden; cursor: crosshair; touch-action: none; }
  #sv-canvas { display: block; width: 100%; height: 220px; }

  /* Hue slider */
  .hue-wrap { border-radius: 6px; overflow: hidden; cursor: crosshair; touch-action: none; }
  #hue-canvas { display: block; width: 100%; height: 28px; }

  /* Values */
  .values { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .val-box {
    background: #f4f4f4; border-radius: 8px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .val-label { font-size: 0.65rem; color: #999; letter-spacing: 0.1em; text-transform: uppercase; }
  .val-text { font-size: 1rem; font-weight: 600; color: #222; cursor: pointer; }
  .val-text:hover { color: #4a90d9; }
  .copy-hint { font-size: 0.65rem; color: #bbb; margin-top: 2px; }

  /* History */
  .history-section h2 { font-size: 0.75rem; color: #aaa; letter-spacing: 0.1em; margin-bottom: 12px; }
  .history { display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch {
    width: 44px; height: 44px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .swatch:hover { transform: scale(1.15); border-color: #0002; }
  .swatch .swatch-tip {
    display: none; position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; font-size: 0.7rem; padding: 4px 8px;
    border-radius: 4px; white-space: nowrap; pointer-events: none;
  }
  .swatch:hover .swatch-tip { display: block; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 20px;
    background: #4a90d9; color: #fff; font-size: 0.85rem; font-weight: 600;
    padding: 10px 18px; border-radius: 8px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<h1>COLOR PALETTE</h1>
<div class="layout">
  <div class="sv-wrap">
    <canvas id="sv-canvas"></canvas>
  </div>
  <div class="hue-wrap">
    <canvas id="hue-canvas"></canvas>
  </div>

  <div class="values">
    <div class="val-box">
      <span class="val-label">HEX</span>
      <span class="val-text" id="hex" onclick="copy('hex')"></span>
      <span class="copy-hint">クリックでコピー</span>
    </div>
    <div class="val-box">
      <span class="val-label">RGB</span>
      <span class="val-text" id="rgb" onclick="copy('rgb')"></span>
      <span class="copy-hint">クリックでコピー</span>
    </div>
    <div class="val-box">
      <span class="val-label">HSL</span>
      <span class="val-text" id="hsl" onclick="copy('hsl')"></span>
      <span class="copy-hint">クリックでコピー</span>
    </div>
    <div class="val-box">
      <span class="val-label">CSS</span>
      <span class="val-text" id="css" onclick="copy('css')"></span>
      <span class="copy-hint">クリックでコピー</span>
    </div>
  </div>

  <div class="history-section">
    <h2>履歴（クリックで再選択）</h2>
    <div class="history" id="history"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// HSV state (H: 0-360, S: 0-100, V: 0-100)
let H = 210, S = 52, V = 97;
const historyList = [];

// --- Color conversions ---
function hsvToRgb(h, s, v) {
  s /= 100; v /= 100;
  const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r, g, b;
  if      (h < 60)  { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }
  else if (h < 240) { r=0; g=x; b=c; }
  else if (h < 300) { r=x; g=0; b=c; }
  else              { r=c; g=0; b=x; }
  return { r: Math.round((r+m)*255), g: Math.round((g+m)*255), b: Math.round((b+m)*255) };
}

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(n => n.toString(16).padStart(2,'0')).join('');
}

function rgbToHsl(r, g, b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h=((g-b)/d + (g<b?6:0))/6; break;
      case g: h=((b-r)/d + 2)/6; break;
      case b: h=((r-g)/d + 4)/6; break;
    }
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function hexToHsv(hex) {
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0;
  if (d) {
    switch(max) {
      case r: h=((g-b)/d+6)%6; break;
      case g: h=(b-r)/d+2; break;
      case b: h=(r-g)/d+4; break;
    }
    h = Math.round(h*60);
  }
  return { h, s: max ? Math.round(d/max*100) : 0, v: Math.round(max*100) };
}

// --- Canvas setup ---
const svCanvas  = document.getElementById('sv-canvas');
const hueCanvas = document.getElementById('hue-canvas');
const svCtx     = svCanvas.getContext('2d');
const hueCtx    = hueCanvas.getContext('2d');

function setupCanvas(canvas) {
  const dpr  = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
  canvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
}

// --- Drawing ---
function drawSV() {
  const rect = svCanvas.getBoundingClientRect();
  const W = rect.width, H_px = rect.height;

  svCtx.fillStyle = `hsl(${H},100%,50%)`;
  svCtx.fillRect(0, 0, W, H_px);

  const wg = svCtx.createLinearGradient(0,0,W,0);
  wg.addColorStop(0, 'rgba(255,255,255,1)');
  wg.addColorStop(1, 'rgba(255,255,255,0)');
  svCtx.fillStyle = wg;
  svCtx.fillRect(0, 0, W, H_px);

  const bg = svCtx.createLinearGradient(0,0,0,H_px);
  bg.addColorStop(0, 'rgba(0,0,0,0)');
  bg.addColorStop(1, 'rgba(0,0,0,1)');
  svCtx.fillStyle = bg;
  svCtx.fillRect(0, 0, W, H_px);

  const cx = S/100 * W, cy = (1 - V/100) * H_px;
  svCtx.beginPath();
  svCtx.arc(cx, cy, 7, 0, Math.PI*2);
  svCtx.strokeStyle = '#fff';
  svCtx.lineWidth = 2.5;
  svCtx.stroke();
  svCtx.beginPath();
  svCtx.arc(cx, cy, 8.5, 0, Math.PI*2);
  svCtx.strokeStyle = 'rgba(0,0,0,0.35)';
  svCtx.lineWidth = 1;
  svCtx.stroke();
}

function drawHue() {
  const rect = hueCanvas.getBoundingClientRect();
  const W = rect.width, H_px = rect.height;

  const grad = hueCtx.createLinearGradient(0,0,W,0);
  for (let i=0; i<=6; i++) grad.addColorStop(i/6, `hsl(${i*60},100%,50%)`);
  hueCtx.fillStyle = grad;
  hueCtx.fillRect(0, 0, W, H_px);

  const cx = H/360 * W;
  hueCtx.fillStyle = '#fff';
  hueCtx.fillRect(cx-3, 1, 6, H_px-2);
  hueCtx.strokeStyle = 'rgba(0,0,0,0.35)';
  hueCtx.lineWidth = 1;
  hueCtx.strokeRect(cx-2.5, 1.5, 5, H_px-3);
}

function redraw() { drawSV(); drawHue(); }

// --- Value display ---
function updateValues() {
  const {r,g,b} = hsvToRgb(H,S,V);
  const hex = rgbToHex(r,g,b);
  const {h,s,l} = rgbToHsl(r,g,b);
  document.getElementById('hex').textContent = hex.toUpperCase();
  document.getElementById('rgb').textContent = `${r}, ${g}, ${b}`;
  document.getElementById('hsl').textContent = `${h}°, ${s}%, ${l}%`;
  document.getElementById('css').textContent = `rgb(${r},${g},${b})`;
}

// --- Pointer handling ---
function getPos(e, el) {
  const rect = el.getBoundingClientRect();
  const pt   = e.touches ? e.touches[0] : e;
  return {
    x: Math.max(0, Math.min(rect.width,  pt.clientX - rect.left)),
    y: Math.max(0, Math.min(rect.height, pt.clientY - rect.top))
  };
}

function onSV(e) {
  e.preventDefault();
  const {x,y} = getPos(e, svCanvas);
  const rect = svCanvas.getBoundingClientRect();
  S = Math.round(x / rect.width  * 100);
  V = Math.round((1 - y / rect.height) * 100);
  redraw(); updateValues();
}

function onHue(e) {
  e.preventDefault();
  const {x} = getPos(e, hueCanvas);
  H = Math.round(x / hueCanvas.getBoundingClientRect().width * 360) % 360;
  redraw(); updateValues();
}

function addHistoryEntry() {
  const {r,g,b} = hsvToRgb(H,S,V);
  const hex = rgbToHex(r,g,b);
  if (historyList.includes(hex)) return;
  historyList.unshift(hex);
  if (historyList.length > 20) historyList.pop();
  document.getElementById('history').innerHTML = historyList.map(c => `
    <div class="swatch" style="background:${c}" onclick="setColor('${c}')">
      <span class="swatch-tip">${c.toUpperCase()}</span>
    </div>`).join('');
}

function bindDrag(el, handler) {
  let active = false;
  const end = () => { if (active) { active=false; addHistoryEntry(); } };
  el.addEventListener('mousedown',  e => { active=true; handler(e); });
  el.addEventListener('mousemove',  e => { if (active) handler(e); });
  el.addEventListener('mouseup',    end);
  el.addEventListener('mouseleave', end);
  el.addEventListener('touchstart', e => { active=true; handler(e); }, {passive:false});
  el.addEventListener('touchmove',  e => { if (active) handler(e); }, {passive:false});
  el.addEventListener('touchend',   end);
}

bindDrag(svCanvas,  onSV);
bindDrag(hueCanvas, onHue);

// --- History click ---
function setColor(hex) {
  const {h,s,v} = hexToHsv(hex);
  H=h; S=s; V=v;
  redraw(); updateValues();
}

// --- Copy ---
async function copy(id) {
  const text = document.getElementById(id).textContent;
  const t = document.getElementById('toast');
  try {
    await navigator.clipboard.writeText(text);
    t.textContent = `「${text}」をコピーしました`;
  } catch {
    t.textContent = 'コピーに失敗しました';
  }
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// --- Init ---
function init() {
  setupCanvas(svCanvas);
  setupCanvas(hueCanvas);
  redraw();
  updateValues();
  addHistoryEntry();
}

window.addEventListener('resize', () => {
  setupCanvas(svCanvas);
  setupCanvas(hueCanvas);
  redraw();
});

init();
</script>
</body>
</html>
