function renderGraph() {
  document.getElementById('graphYearLabel').textContent = graphYear + '年';
  const data = loadData();

  let labels = [], incomes = [], expenses = [], title = '';

  if (graphMode === 'monthly') {
    labels   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    title    = graphYear + '年　月別収支';
    incomes  = Array(12).fill(0);
    expenses = Array(12).fill(0);
    data.filter(e => new Date(e.date).getFullYear() === graphYear).forEach(e => {
      const mo = new Date(e.date).getMonth();
      if (e.type === 'income') incomes[mo] += e.amount;
      else                     expenses[mo] += e.amount;
    });

  } else if (graphMode === 'yearly') {
    const years = getYearRange(data);
    labels   = years.map(y => y + '年');
    title    = '年別収支';
    incomes  = years.map(y => data.filter(e=>e.type==='income'  && new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0));
    expenses = years.map(y => data.filter(e=>e.type==='expense' && new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0));

  } else if (graphMode === 'cat') {
    labels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    title  = `${graphYear}年　${catName}　月別推移`;
    const vals = Array(12).fill(0);
    data.filter(e =>
      e.type === catType &&
      e.category === catName &&
      new Date(e.date).getFullYear() === graphYear
    ).forEach(e => { vals[new Date(e.date).getMonth()] += e.amount; });
    const total = vals.reduce((s,v) => s+v, 0);
    const color = catType === 'income' ? '#13A18C' : '#E74C3C';
    drawLineChart(vals, labels, title, color);
    document.getElementById('graphSummary').innerHTML = `
      <div class="card"><div class="card-title">${graphYear}年　合計</div><div class="card-value" style="color:${color}">¥${fmt(total)}</div></div>
      <div class="card"><div class="card-title">月平均</div><div class="card-value" style="color:${color}">¥${fmt(Math.round(total/12))}</div></div>
    `;
    return;

  } else {
    const years    = getYearRange(data);
    labels         = years.map(y => y + '年');
    title          = '複数年　収支推移';
    const balances = years.map(y => {
      const inc = data.filter(e=>e.type==='income'  && new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0);
      const exp = data.filter(e=>e.type==='expense' && new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0);
      return inc - exp;
    });
    drawChart([{
      label: '収支',
      data: balances,
      backgroundColor: balances.map(v => v >= 0 ? '#13A18C' : '#E74C3C'),
      borderRadius: 5
    }], labels, title);

    const totInc = data.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const totExp = data.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    document.getElementById('graphSummary').innerHTML = `
      <div class="card"><div class="card-title">累計収入</div><div class="card-value income">¥${fmt(totInc)}</div></div>
      <div class="card"><div class="card-title">累計支出</div><div class="card-value expense">¥${fmt(totExp)}</div></div>
    `;
    renderPieChart();
    return;
  }

  drawChart([
    { label:'収入', data: incomes,  backgroundColor:'#13A18C', borderRadius: 5 },
    { label:'支出', data: expenses, backgroundColor:'#E74C3C', borderRadius: 5 }
  ], labels, title);

  const totI = incomes.reduce((s,v)=>s+v,0);
  const totE = expenses.reduce((s,v)=>s+v,0);
  document.getElementById('graphSummary').innerHTML = `
    <div class="card"><div class="card-title">合計収入</div><div class="card-value income">¥${fmt(totI)}</div></div>
    <div class="card"><div class="card-title">合計支出</div><div class="card-value expense">¥${fmt(totE)}</div></div>
  `;
  renderPieChart();
}

function drawChart(datasets, labels, title) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();
  mainChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { font: { family: 'メイリオ' }, color: '#1A1D2E' } },
        title:  { display: true, text: title, font: { family: 'メイリオ', size: 13 }, color: '#1A1D2E' }
      },
      scales: {
        x: { ticks: { font: { family: 'メイリオ', size: 11 }, color: '#6B7280' } },
        y: { ticks: { font: { family: 'メイリオ', size: 11 }, color: '#6B7280',
                      callback: v => '¥' + fmt(v) } }
      }
    }
  });
}

function drawLineChart(values, labels, title, color) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();
  mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: title,
        data: values,
        borderColor: color,
        backgroundColor: color + '22',
        borderWidth: 2.5,
        pointBackgroundColor: color,
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.35
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        title: { display: true, text: title, font: { family: 'メイリオ', size: 13 }, color: '#1A1D2E' }
      },
      scales: {
        x: { ticks: { font: { family: 'メイリオ', size: 11 }, color: '#6B7280' } },
        y: { ticks: { font: { family: 'メイリオ', size: 11 }, color: '#6B7280',
                      callback: v => '¥' + fmt(v) },
             beginAtZero: true }
      }
    }
  });
}

// ============================================================
//  Pie Chart
// ============================================================
const PIE_PALETTE = ['#13A18C', '#07927E', '#008370', '#007462'];

const donutLabelPlugin = {
  id: 'donutLabel',
  afterDatasetDraw(chart) {
    if (chart.config.type !== 'doughnut') return;
    const { ctx } = chart;
    const meta    = chart.getDatasetMeta(0);
    if (!meta.data || !meta.data.length) return;
    const dataset = chart.data.datasets[0];
    const total   = dataset.data.reduce((s, v) => s + v, 0);
    if (!total) return;

    meta.data.forEach((arc, i) => {
      const span = Math.abs(arc.endAngle - arc.startAngle);
      if (span < 0.18) return;
      const mid  = arc.startAngle + span / 2;
      const midR = (arc.innerRadius + arc.outerRadius) / 2;
      const x    = arc.x + Math.cos(mid) * midR;
      const y    = arc.y + Math.sin(mid) * midR;
      const pct  = Math.round(dataset.data[i] / total * 100) + '%';

      ctx.save();
      ctx.fillStyle    = 'white';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 11px メイリオ';
      ctx.fillText(pct, x, y - 7);
      ctx.font = '9px メイリオ';
      ctx.fillText(chart.data.labels[i], x, y + 6);
      ctx.restore();
    });
  }
};

function renderPieMonthLabel() {
  const el = document.getElementById('pieMonthLabel');
  if (el) el.textContent = graphYear + '年 ' + graphPieMonth + '月';
}

function renderPieChart() {
  const data = loadData();

  let filtered = data.filter(e => {
    if (e.type !== pieType) return false;
    const d  = new Date(e.date);
    const y  = d.getFullYear();
    const mo = d.getMonth() + 1;
    if (graphMode === 'monthly') return y === graphYear && mo === graphPieMonth;
    if (graphMode === 'yearly')  return y === graphYear;
    return true;
  });

  const totals = {};
  filtered.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });

  const entries = Object.entries(totals).sort((a,b) => b[1]-a[1]);
  const labels  = entries.map(([k]) => k);
  const values  = entries.map(([,v]) => v);
  const colors  = entries.map((_, i) => PIE_PALETTE[i % 4]);
  const total   = values.reduce((s,v) => s+v, 0);

  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChart) pieChart.destroy();

  if (total === 0) {
    document.getElementById('pieLegend').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:20px;font-size:13px">データがありません</div>';
    pieChart = null;
    return;
  }

  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }]
    },
    options: {
      responsive: true,
      cutout: '30%',
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: (() => {
            const lbl = pieType === 'income' ? '収入' : '支出';
            if (graphMode === 'monthly') return `${graphYear}年 ${graphPieMonth}月　${lbl}内訳`;
            if (graphMode === 'yearly')  return `${graphYear}年　${lbl}内訳`;
            return `全期間　${lbl}内訳`;
          })(),
          font: { family: 'メイリオ', size: 13 },
          color: '#1A1D2E'
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ¥${fmt(ctx.parsed)} (${Math.round(ctx.parsed/total*100)}%)`
          }
        }
      }
    },
    plugins: [donutLabelPlugin]
  });

  document.getElementById('pieLegend').innerHTML = entries.map(([cat, val], i) => `
    <div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${colors[i]}"></div>
      <div class="pie-legend-name">${cat}</div>
      <div class="pie-legend-val">¥${fmt(val)}</div>
    </div>
  `).join('');
}

function getYearRange(data) {
  if (data.length === 0) return [new Date().getFullYear()];
  const years = [...new Set(data.map(e => new Date(e.date).getFullYear()))].sort();
  const min = years[0], max = years[years.length-1];
  const result = [];
  for (let y = min; y <= max; y++) result.push(y);
  return result;
}

// ============================================================
//  仕訳帳 (History)
// ============================================================
function renderHistory() {
  const fy = parseInt(document.getElementById('filterYear').value);
  const fm = document.getElementById('filterMonth').value;
  const ft = document.getElementById('filterType').value;

  let data = loadData().filter(e => new Date(e.date).getFullYear() === fy);
  if (fm !== 'all') data = data.filter(e => new Date(e.date).getMonth()+1 === parseInt(fm));
  if (ft !== 'all') data = data.filter(e => e.type === ft);
  data.sort((a,b) => b.date.localeCompare(a.date));

  const list = document.getElementById('historyList');
  if (data.length === 0) {
    list.innerHTML = '<div class="empty-msg">該当する記録がありません</div>';
    return;
  }

  // 日付ごとにグループ化
  const groups = {};
  data.forEach(e => { (groups[e.date] = groups[e.date] || []).push(e); });
  const dates = Object.keys(groups).sort((a,b) => b.localeCompare(a));

  list.innerHTML = dates.map(date => {
    const entries = groups[date];
    const net     = entries.reduce((s,e) => s + (e.type === 'income' ? e.amount : -e.amount), 0);
    const netStr  = (net >= 0 ? '+' : '') + '¥' + fmt(net);
    const d       = new Date(date + 'T00:00:00');
    const dlabel  = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

    const rows = entries.map(e => {
      const sign = e.type === 'income' ? '+' : '-';
      const cls  = e.type === 'income' ? 'income' : 'expense';
      return `
        <div class="jnl-entry" onclick="openEditScreen('${e.id}')">
          <div class="jnl-cat-wrap">
            <span class="jnl-cat">${e.category}</span>
            ${e.memo ? `<span class="jnl-note">${e.memo}</span>` : ''}
          </div>
          <span class="jnl-amt ${cls}">${sign}¥${fmt(e.amount)}</span>
        </div>`;
    }).join('');

    return `
      <div class="jnl-group">
        <div class="jnl-date-header">
          <span class="jnl-date-label">${dlabel}</span>
          <span class="jnl-net">${netStr}</span>
        </div>
        ${rows}
      </div>`;
  }).join('');
}

function buildFilterYearOptions() {
  const data  = loadData();
  const years = getYearRange(data);
  const cy    = new Date().getFullYear();
  if (!years.includes(cy)) years.push(cy);
  years.sort((a,b) => b-a);
  const sel = document.getElementById('filterYear');
  sel.innerHTML = years.map(y => `<option value="${y}">${y}年</option>`).join('');
}

function deleteEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  const data = loadData().filter(e => e.id !== id);
  saveData(data);
  buildFilterYearOptions();
  renderHistory();
  showToast('削除しました');
}

function exportCSV() {
  const fy = parseInt(document.getElementById('filterYear').value);
  const fm = document.getElementById('filterMonth').value;
  const ft = document.getElementById('filterType').value;

  let data = loadData().filter(e => new Date(e.date).getFullYear() === fy);
  if (fm !== 'all') data = data.filter(e => new Date(e.date).getMonth()+1 === parseInt(fm));
  if (ft !== 'all') data = data.filter(e => e.type === ft);
  data.sort((a,b) => a.date.localeCompare(b.date));

  const header = '日付,種別,科目,支払方法,備考,金額';
  const rows = data.map(e => [
    e.date,
    e.type === 'income' ? '収入' : '支出',
    e.category,
    e.payment || '',
    (e.memo || '').replace(/,/g, '、'),
    e.amount
  ].join(','));

  const bom  = '﻿';
  const csv  = bom + [header, ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const ymLabel = fm === 'all' ? `${fy}年` : `${fy}年${fm}月`;
  a.href     = url;
  a.download = `収支_${ymLabel}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

  window.print();
}

function openEditScreen(id) {
  const numId = typeof id === 'string' ? parseInt(id) : id;
  const entry = loadData().find(e => e.id === numId);
  if (!entry) return;

  editingEntryId = numId;
  editType       = entry.type;
  editDateVal    = new Date(entry.date + 'T00:00:00');
  editPayment    = entry.payment || '現金';
  editSubject    = entry.category;
  editAmountStr  = String(entry.amount);

  const pad = n => String(n).padStart(2,'0');
  document.getElementById('editDateDisplay').textContent    = `${editDateVal.getFullYear()}年${editDateVal.getMonth()+1}月${editDateVal.getDate()}日`;
  document.getElementById('editPaymentLabel').textContent   = entry.type === 'income' ? '受け取り方法' : '支払方法';
  document.getElementById('editPaymentDisplay').textContent = editPayment;
  document.getElementById('editSubjectDisplay').textContent = editSubject;
  document.getElementById('editMemoField').value            = entry.memo || '';
  document.getElementById('editAmountDisplay').textContent  = '¥' + fmt(entry.amount);

  document.getElementById('editScreen').classList.add('open');
}

function closeEditScreen() {
  document.getElementById('editScreen').classList.remove('open');
  editingEntryId = null;
}

function saveEntryEdit() {
  const amount = parseInt(editAmountStr);
  if (!amount || amount <= 0) { showToast('金額を入力してください'); return; }
  const pad  = n => String(n).padStart(2,'0');
  const date = `${editDateVal.getFullYear()}-${pad(editDateVal.getMonth()+1)}-${pad(editDateVal.getDate())}`;
  const memo = document.getElementById('editMemoField').value.trim();

  const data = loadData().map(e => e.id === editingEntryId
    ? { ...e, date, payment: editPayment, category: editSubject, memo, amount }
    : e);
  saveData(data);
  closeEditScreen();
  buildFilterYearOptions();
  renderHistory();
  renderPL();
  showToast('更新しました');
}

function openEditSelSheet(mode) {
  const isPayment = mode === 'payment';
  const isIncome  = editType === 'income';
  const items     = isPayment ? getPaymentMethods() : (isIncome ? getIncomeSubs() : getExpenseSubs());
  const selected  = isPayment ? editPayment : editSubject;
  const addLabel  = isPayment ? '+ 受取/支払方法を追加' : '+ 科目を追加';

  document.getElementById('selSheetTitle').innerHTML = `<span>${isPayment ? (isIncome ? '受け取り方法' : '支払方法') : '科目を選択'}</span>`;
  document.getElementById('selSheetList').innerHTML =
    items.map((item, i) => `
      <div class="input-option-item${item === selected ? ' selected' : ''}"
           onclick="editSelSheetSelect('${mode}',${i})">
        <span>${item}</span>
        ${item === selected ? '<span class="input-option-check">✓</span>' : ''}
      </div>`).join('') +
    `<div class="input-option-add" onclick="${isPayment ? 'addPaymentMethod()' : 'addSubject()'}">
      ${addLabel}
    </div>`;

  document.getElementById('selSheetOverlay').style.display = 'block';
  document.getElementById('selSheetPanel').style.display   = 'block';
}

function editSelSheetSelect(mode, idx) {
  const isIncome = editType === 'income';
  if (mode === 'payment') {
    editPayment = getPaymentMethods()[idx];
    document.getElementById('editPaymentDisplay').textContent = editPayment;
  } else {
    editSubject = (isIncome ? getIncomeSubs() : getExpenseSubs())[idx];
    document.getElementById('editSubjectDisplay').textContent = editSubject;
  }
  closeSelSheet();
}

function migrateData() {
  if (!localStorage.getItem('traqr_migrated_v2')) {
    const catMap = { '補助金・助成金': '雑収入', '売上': '売上高' };
    const data = loadData().map(e => ({ ...e, category: catMap[e.category] || e.category }));
    saveData(data);
    const incomeSubs = getIncomeSubs().map(s => s === '売上' ? '売上高' : s);
    saveIncomeSubs(incomeSubs);
    localStorage.setItem('traqr_migrated_v1', '1');
    localStorage.setItem('traqr_migrated_v2', '1');
  }
}

function init() {
  seedData();

}
